<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .login {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 500px;
            width: 400px;
            /* border: 2px solid black; */
            margin: 50px;
            /* text-transform: uppercase; */
        }
        
        form {
            display: block;
            box-sizing: border-box;
            border-radius: 10px;
            padding: 50px;
            width: 100%;
            height: 100%;
            flex-direction: column;
            display: flex;
            gap: 5px;
            border: none;
            box-shadow: 0px 5px 5px 5px rgb(154, 154, 154);
        }
        input{
            border: 1px solid grey;
            border-radius: 5px;
            color: black;
            padding: 10px;

        }
        .btn1{ background-color: rgb(22, 22, 241);
            color: white;
            padding: 10px 50px;
            font-size: 18px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .btn2{
            text-align: center;
            text-decoration: none;
        }
        .btn3{
            padding: 10px;
            background-color: green;
            color: white;
            font-size: medium;
            border: none;
            border-radius: 5px;
            /* margin-bottom: 60px; */
            margin: 60px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="login">
        <form>
            <label for="username">USERNAME</label>
            <input type="text">
            <label for="password">PASSWORD</label>
            <input type="password">
            <br>
            <button class="btn1">login</button>
            <br>
            <a href="#" class="btn2">forgotten password?</a>
            <!-- <br> -->
            <button class="btn3">
                create new account
            </button>
        </form>
    </div>
</body>

</html>
