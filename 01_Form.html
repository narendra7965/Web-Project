<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{display: flex;
            justify-content: center;
        }
        .login{
            border: 1px solid black;
            width: 400px;
            height: 500px;
            background: url("https://static.vecteezy.com/system/resources/previews/022/809/086/non_2x/artificial-intelligence-background-in-the-form-of-a-human-brain-against-the-background-of-graphs-of-numbers-and-calculations-interaction-between-ai-and-humans-ai-generation-photo.jpg");
            color: white;
            border-radius: 20px;
            box-shadow:  0px 0px 20px rgba(0,0,0,0.75);
            background-size: cover;
            background-position: center;
            overflow:hidden;
        }
        form{
            display:block ;
            box-sizing: border-box;
            padding: 40px;
            width: 100%;
            height: 100%;
            backdrop-filter: brightness(50%);
            flex-direction: column;
            display: flex;
            gap: 5px;
        }
        h1{
            font-weight: normal;
            font-size: 24px;
            text-shadow: 0px 0px 2px rgba(0,0,0,0.5);
            margin-bottom: 60px;
        }
        label{
            color: rgba(206, 204, 204, 0.8);
            text-transform: uppercase;
            font-size: 10px;
            letter-spacing: 2px;
            padding-left: 10px;
        }
        input{
            background: rgba(255,255,255,0.3);
            height: 40px;
            line-height: 40px;
            border-radius: 20px;
            padding: 0px 20px;
            border: none;
            margin-bottom: 20px;
            color: white;
        }
        button{
        
            background: rgb(33, 115, 223);
            height: 40px;
            line-height: 40px;
            border: none;
            margin: 10px 0px;
            box-shadow: 0px 0px 5px;
            color:white;
            border-radius: 15px;
        }
    </style>
</head>
<body>
    <div class="login">
<form action="DAY8.html">
    <h1>LOG IN</h1>
    <label for="username">username</label>
    <input type="text">
<label for="password">password</label>
<input type="password">
<button>submit</button>
</form>
    </div>
</body>
</html>
